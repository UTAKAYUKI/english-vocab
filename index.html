<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="英単語帳">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>英単語帳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #6366f1;
    --accent2: #818cf8;
    --text: #f1f5f9;
    --subtext: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--card);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 700; color: var(--accent2); }
  .header-count { font-size: 11px; color: var(--subtext); margin-top: 2px; }
  .header-btns { display: flex; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px;
    border: none; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: var(--text); font-size: 15px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:active { background: rgba(255,255,255,0.18); }

  /* Category bar */
  .cat-bar {
    display: flex; gap: 6px; padding: 8px 16px;
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-btn {
    padding: 4px 12px; border-radius: 20px; border: none;
    background: rgba(255,255,255,0.08); color: var(--subtext);
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap;
  }
  .cat-btn.active { background: var(--accent); color: #fff; }

  /* Progress */
  .progress-bar {
    height: 2px; background: rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s;
  }

  /* Card area */
  .card-area {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px 16px;
    overflow: hidden;
  }

  .card {
    width: 100%; max-width: 420px;
    background: var(--card);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.12s;
  }
  .card:active { transform: scale(0.98); }

  .word-category {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: var(--accent2); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .word-en {
    font-size: clamp(34px, 9vw, 52px);
    font-weight: 800; letter-spacing: -1px;
    color: var(--text); line-height: 1.1;
    margin-bottom: 6px;
  }
  .word-phonetic {
    font-size: 15px; color: var(--subtext);
    margin-bottom: 14px; min-height: 20px;
  }
  .divider {
    width: 40px; height: 2px;
    background: var(--accent); border-radius: 2px;
    margin: 0 auto 14px;
  }
  .word-jp {
    font-size: clamp(17px, 4.5vw, 22px);
    color: var(--subtext); font-weight: 600; line-height: 1.4;
  }
  .word-example {
    font-size: 12px; color: #475569;
    margin-top: 12px; line-height: 1.6; display: none;
  }
  .card.show-example .word-example { display: block; }

  /* Speaking dots */
  .speaking-dots {
    display: flex; gap: 5px; margin-top: 14px;
    justify-content: center; min-height: 18px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); opacity: 0.2;
  }
  .dot.active { opacity: 1; animation: pulse 0.5s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.6); }
  }

  .swipe-hint { font-size: 11px; color: #334155; margin-top: 10px; }

  /* Controls */
  .controls {
    padding: 10px 14px 16px;
    background: var(--card);
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  /* Mode selector */
  .mode-row {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .mode-btn {
    flex: 1; padding: 9px;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: var(--subtext);
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Main controls row */
  .main-row {
    display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
  }
  .btn-nav {
    width: 52px; height: 52px;
    border: none; border-radius: 14px;
    background: rgba(255,255,255,0.08); color: var(--text);
    font-size: 18px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-nav:active { background: rgba(255,255,255,0.16); }

  .btn-play {
    flex: 1; height: 52px;
    border: none; border-radius: 16px;
    background: var(--accent); color: #fff;
    font-size: 17px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s;
  }
  .btn-play:active { transform: scale(0.97); }
  .btn-play.playing { background: #4338ca; }

  /* Sub row */
  .sub-row {
    display: flex; gap: 8px;
  }
  .btn-sub {
    flex: 1; padding: 10px;
    border: none; border-radius: 12px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-sub:active { transform: scale(0.96); }
  .btn-sticker { background: rgba(239,68,68,0.15); color: var(--red); }
  .btn-ok { background: rgba(34,197,94,0.15); color: var(--green); }

  /* Interval row (continuous mode only) */
  .interval-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; display: none;
  }
  .interval-row.show { display: flex; }
  .interval-label { font-size: 12px; color: var(--subtext); }
  .interval-select {
    background: rgba(255,255,255,0.06); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 7px 10px; font-size: 13px; cursor: pointer; flex: 1;
  }
  /* Countdown bar */
  .countdown-bar {
    height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 3px; margin-top: 8px; overflow: hidden; display: none;
  }
  .countdown-bar.show { display: block; }
  .countdown-fill {
    height: 100%; background: var(--accent);
    border-radius: 3px; width: 100%;
    transition: width 1s linear;
  }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%; max-width: 480px;
    background: var(--card); border-radius: 24px 24px 0 0;
    padding: 20px 18px 32px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 85dvh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--subtext); font-weight: 600; margin-bottom: 5px; display: block; }
  .form-input, .form-select {
    width: 100%; padding: 11px 13px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 11px; color: var(--text); font-size: 15px;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .btn-submit {
    width: 100%; padding: 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 13px;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px;
  }
  .btn-cancel-modal {
    width: 100%; padding: 11px;
    background: rgba(255,255,255,0.06); color: var(--subtext);
    border: none; border-radius: 13px;
    font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 800; color: var(--accent2); }
  .stat-label { font-size: 11px; color: var(--subtext); margin-top: 3px; }
  .sticker-item {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(239,68,68,0.08); border-radius: 11px; padding: 10px 12px; margin-bottom: 6px;
  }
  .sticker-word { font-weight: 700; font-size: 14px; }
  .sticker-jp { font-size: 12px; color: var(--subtext); }
  .btn-remove { background: none; border: none; color: var(--red); font-size: 16px; cursor: pointer; }

  /* Toast */
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--accent); color: #fff;
    padding: 9px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    transition: transform 0.3s; z-index: 200; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .card-fade { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">📖 英単語帳</div>
    <div class="header-count" id="countLabel">---</div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" onclick="openStats()">📊</button>
    <button class="icon-btn" onclick="openAddWord()">＋</button>
  </div>
</div>

<!-- Category bar -->
<div class="cat-bar" id="catBar"></div>

<!-- Progress bar -->
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- Card area -->
<div class="card-area" id="cardArea">
  <div class="card" id="mainCard" onclick="handleCardTap()">
    <div class="word-category" id="wordCategory"></div>
    <div class="word-en" id="wordEn">---</div>
    <div class="word-phonetic" id="wordPhonetic"></div>
    <div class="divider"></div>
    <div class="word-jp" id="wordJp">読み込み中...</div>
    <div class="word-example" id="wordExample"></div>
    <div class="speaking-dots">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>
  <div class="swipe-hint">← スワイプで前後へ移動 →</div>
</div>

<!-- Controls -->
<div class="controls">

  <!-- Mode selector -->
  <div class="mode-row">
    <button class="mode-btn active" id="modeSingle" onclick="setMode('single')">🔂 1語再生</button>
    <button class="mode-btn" id="modeContinuous" onclick="setMode('continuous')">▶▶ 連続再生</button>
  </div>

  <!-- Nav + Play/Stop -->
  <div class="main-row">
    <button class="btn-nav" onclick="prevWord()">◀</button>
    <button class="btn-play" id="playBtn" onclick="handlePlayStop()">
      <span id="playIcon">▶</span>
      <span id="playLabel">再生</span>
    </button>
    <button class="btn-nav" onclick="nextWord()">▶</button>
  </div>

  <!-- Sticker / OK -->
  <div class="sub-row">
    <button class="btn-sub btn-sticker" onclick="toggleSticker()">🔴 苦手</button>
    <button class="btn-sub btn-ok" onclick="markOk()">✅ 覚えた</button>
  </div>

  <!-- Interval (continuous mode) -->
  <div class="interval-row" id="intervalRow">
    <span class="interval-label">次まで</span>
    <select class="interval-select" id="intervalSelect" onchange="updateInterval()">
      <option value="3">3秒</option>
      <option value="5" selected>5秒</option>
      <option value="8">8秒</option>
      <option value="10">10秒</option>
      <option value="15">15秒</option>
      <option value="20">20秒</option>
      <option value="30">30秒</option>
    </select>
  </div>

  <!-- Countdown bar -->
  <div class="countdown-bar" id="countdownBar">
    <div class="countdown-fill" id="countdownFill"></div>
  </div>

</div>

<!-- Add Word Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">単語を追加</div>
    <div class="form-group">
      <label class="form-label">英単語 *</label>
      <input class="form-input" id="newEn" type="text" placeholder="例: accomplish" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">日本語の意味 *</label>
      <input class="form-input" id="newJp" type="text" placeholder="例: 達成する、成し遂げる" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">発音記号（任意）</label>
      <input class="form-input" id="newPhonetic" type="text" placeholder="例: /əˈkɑːmplɪʃ/" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">例文（任意）</label>
      <input class="form-input" id="newExample" type="text" placeholder="例: She accomplished her goal." autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="newCat">
        <option value="マイ単語">マイ単語</option>
        <option value="基本動詞">基本動詞</option>
        <option value="形容詞">形容詞</option>
        <option value="名詞">名詞</option>
        <option value="TOEIC">TOEIC</option>
        <option value="日常会話">日常会話</option>
        <option value="ビジネス">ビジネス</option>
      </select>
    </div>
    <button class="btn-submit" onclick="addWord()">追加する</button>
    <button class="btn-cancel-modal" onclick="closeModal('addModal')">キャンセル</button>
  </div>
</div>

<!-- Stats Modal -->
<div class="modal-overlay" id="statsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📊 学習状況</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">総単語数</div></div>
      <div class="stat-card"><div class="stat-num" id="statOk">0</div><div class="stat-label">覚えた ✅</div></div>
      <div class="stat-card"><div class="stat-num" id="statSticker">0</div><div class="stat-label">苦手 🔴</div></div>
      <div class="stat-card"><div class="stat-num" id="statCustom">0</div><div class="stat-label">自分で追加</div></div>
    </div>
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;">🔴 苦手単語リスト</div>
    <div id="stickerList"></div>
    <button class="btn-cancel-modal" onclick="closeModal('statsModal')" style="margin-top:16px;">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== WORD DATA =====================
const BUILTIN_WORDS = [
  {en:"accomplish",jp:"達成する、成し遂げる",ph:"/əˈkɑːmplɪʃ/",cat:"基本動詞",ex:"She accomplished her goal."},

  {en:"organize",jp:"整理する、組織する",ph:"/ˈɔːrɡənaɪz/",cat:"基本動詞",ex:"Organize your thoughts."},
  {en:"participate",jp:"参加する",ph:"/pɑːrˈtɪsɪpeɪt/",cat:"基本動詞",ex:"Participate in the meeting."},

// ===================== STATE =====================
let words = [], filtered = [], currentIndex = 0, currentCat = "すべて";
let playMode = 'single';   // 'single' or 'continuous'
let isPlaying = false;
let speakVer = 0;          // キャンセル管理用バージョン番号
let countdownTimer = null;
let countdownSec = 0;
let intervalSec = 5;
let okWords = new Set(), stickerWords = new Set(), customWords = [];

// ===================== STORAGE =====================
function loadStorage() {
  try {
    okWords = new Set(JSON.parse(localStorage.getItem('okWords') || '[]'));
    stickerWords = new Set(JSON.parse(localStorage.getItem('stickerWords') || '[]'));
    customWords = JSON.parse(localStorage.getItem('customWords') || '[]');
  } catch(e) {}
}
function saveStorage() {
  localStorage.setItem('okWords', JSON.stringify([...okWords]));
  localStorage.setItem('stickerWords', JSON.stringify([...stickerWords]));
  localStorage.setItem('customWords', JSON.stringify(customWords));
}

// ===================== WORDS =====================
function buildWords() { words = [...BUILTIN_WORDS, ...customWords]; }
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}
function applyFilter() {
  if (currentCat === "すべて") filtered = [...words];
  else if (currentCat === "苦手のみ") filtered = words.filter(w => stickerWords.has(w.en));
  else filtered = words.filter(w => w.cat === currentCat);
  if (!filtered.length && currentCat === "苦手のみ") {
    filtered = [{en:"苦手単語なし", jp:"苦手マークした単語がここに表示されます", ph:"", cat:"", ex:""}];
  }
  shuffle(filtered);
}
function getCategories() {
  const cats = ["すべて","苦手のみ"];
  const seen = new Set();
  words.forEach(w => { if (!seen.has(w.cat)) { seen.add(w.cat); cats.push(w.cat); } });
  return cats;
}
function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { currentCat = cat; currentIndex = 0; applyFilter(); renderCatBar(); stopAll(); showWord(); };
    bar.appendChild(btn);
  });
}

// ===================== DISPLAY =====================
function showWord() {
  if (!filtered.length) return;
  const w = filtered[currentIndex];
  const card = document.getElementById('mainCard');
  card.className = 'card card-fade';
  setTimeout(() => card.classList.remove('card-fade'), 350);
  card.classList.remove('show-example');
  document.getElementById('wordEn').textContent = w.en;
  document.getElementById('wordEn').style.color = stickerWords.has(w.en) ? 'var(--red)' : 'var(--text)';
  document.getElementById('wordPhonetic').textContent = w.ph || '';
  document.getElementById('wordJp').textContent = w.jp;
  document.getElementById('wordCategory').textContent = w.cat || '';
  document.getElementById('wordExample').textContent = w.ex ? '📝 ' + w.ex : '';
  updateProgress();
  updateCount();
  stopDots();
}
function updateCount() {
  document.getElementById('countLabel').textContent =
    `${filtered.length ? currentIndex+1 : 0} / ${filtered.length}語`;
}
function updateProgress() {
  const pct = filtered.length ? ((currentIndex+1)/filtered.length)*100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===================== VOICES =====================
let voices = [], enVoice = null, jaVoice = null;
function loadVoices() {
  voices = speechSynthesis.getVoices();
  const enPrio = ["Samantha","Karen","Moira","Tessa","Allison","Ava","Susan","Victoria","Fiona"];
  for (const n of enPrio) {
    const v = voices.find(v => v.name.includes(n));
    if (v) { enVoice = v; break; }
  }
  if (!enVoice) enVoice = voices.find(v => v.lang==='en-US') || voices.find(v => v.lang.startsWith('en'));
  jaVoice = voices.find(v => v.lang==='ja-JP' && (v.name.includes('Kyoko')||v.name.includes('O-Ren')))
    || voices.find(v => v.lang==='ja-JP') || voices.find(v => v.lang.startsWith('ja'));
}
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

// ===================== TTS (コールバックチェーン方式) =====================
// async/awaitを使わず、onendコールバックでチェーンする
// → iOS Safariの互換性問題を回避

function speakOne(text, voice, rate, ver, callback) {
  if (speakVer !== ver) return; // キャンセル済み
  const u = new SpeechSynthesisUtterance(text);
  if (voice) u.voice = voice;
  u.rate = rate || 0.9;
  u.pitch = 1.05;
  u.onend = () => { if (speakVer === ver) callback(); };
  u.onerror = () => { if (speakVer === ver) callback(); };
  speechSynthesis.speak(u);
}

function waitThen(ms, ver, callback) {
  setTimeout(() => { if (speakVer === ver) callback(); }, ms);
}

function startSpeakChain(w) {
  const ver = ++speakVer;
  speechSynthesis.cancel();

  // ステップ1: 英語1回目
  activateDot(1);
  speakOne(w.en, enVoice, 0.85, ver, () => {
    // 2秒待つ → 英語2回目
    waitThen(2000, ver, () => {
      activateDot(2);
      speakOne(w.en, enVoice, 0.85, ver, () => {
        // 2秒待つ → 英語3回目
        waitThen(2000, ver, () => {
          activateDot(3);
          speakOne(w.en, enVoice, 0.85, ver, () => {
            stopDots();
            // 0.5秒待つ → 日本語
            waitThen(500, ver, () => {
              if (jaVoice) {
                speakOne(w.jp, jaVoice, 0.9, ver, () => {
                  // 日本語読み上げ完了 → ここからタイマー開始
                  onSpeakComplete(ver);
                });
              } else {
                onSpeakComplete(ver);
              }
            });
          });
        });
      });
    });
  });
}

// 読み上げ完了後の処理
function onSpeakComplete(ver) {
  if (speakVer !== ver) return;
  if (!isPlaying) return;
  if (playMode === 'single') {
    // 1語再生モード: 停止
    setPlayState(false);
  } else {
    // 連続再生モード: カウントダウン開始
    startCountdown(ver);
  }
}

// ===================== COUNTDOWN =====================
function startCountdown(ver) {
  if (speakVer !== ver) return;
  const total = intervalSec;
  countdownSec = total;
  showCountdownBar(true);
  setCountdownFill(1.0);

  countdownTimer = setInterval(() => {
    if (speakVer !== ver) { clearCountdown(); return; }
    countdownSec--;
    setCountdownFill(countdownSec / total);
    if (countdownSec <= 0) {
      clearCountdown();
      if (speakVer === ver && isPlaying) goNext();
    }
  }, 1000);
}

function clearCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  showCountdownBar(false);
  setCountdownFill(1.0);
}

function setCountdownFill(ratio) {
  document.getElementById('countdownFill').style.width = (ratio * 100) + '%';
}
function showCountdownBar(show) {
  document.getElementById('countdownBar').classList.toggle('show', show);
}

// ===================== PLAY / STOP =====================
function handlePlayStop() {
  if (isPlaying) {
    stopAll();
  } else {
    startPlay();
  }
}

function startPlay() {
  setPlayState(true);
  const w = filtered[currentIndex];
  if (w && w.en !== '苦手単語なし') startSpeakChain(w);
}

function stopAll() {
  speakVer++;
  speechSynthesis.cancel();
  clearCountdown();
  setPlayState(false);
  stopDots();
}

function setPlayState(playing) {
  isPlaying = playing;
  const btn = document.getElementById('playBtn');
  const icon = document.getElementById('playIcon');
  const label = document.getElementById('playLabel');
  if (playing) {
    btn.classList.add('playing');
    icon.textContent = '⏸';
    label.textContent = '停止';
  } else {
    btn.classList.remove('playing');
    icon.textContent = '▶';
    label.textContent = '再生';
  }
}

// ===================== NAVIGATION =====================
function goNext() {
  currentIndex = (currentIndex + 1) % filtered.length;
  showWord();
  if (isPlaying) {
    const w = filtered[currentIndex];
    if (w && w.en !== '苦手単語なし') startSpeakChain(w);
  }
}

function nextWord() {
  stopAll();
  currentIndex = (currentIndex + 1) % filtered.length;
  showWord();
}

function prevWord() {
  stopAll();
  currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
  showWord();
}

function handleCardTap() {
  const card = document.getElementById('mainCard');
  const w = filtered[currentIndex];
  if (w && w.ex) card.classList.toggle('show-example');
}

// ===================== MODE =====================
function setMode(mode) {
  playMode = mode;
  document.getElementById('modeSingle').classList.toggle('active', mode === 'single');
  document.getElementById('modeContinuous').classList.toggle('active', mode === 'continuous');
  document.getElementById('intervalRow').classList.toggle('show', mode === 'continuous');
  if (isPlaying) stopAll();
}

function updateInterval() {
  intervalSec = parseInt(document.getElementById('intervalSelect').value);
}

// ===================== SWIPE =====================
let touchStartX = 0, touchStartY = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextWord(); else prevWord();
  }
}, {passive: true});

// ===================== STICKER / OK =====================
function toggleSticker() {
  const w = filtered[currentIndex];
  if (!w || !w.en) return;
  if (stickerWords.has(w.en)) {
    stickerWords.delete(w.en);
    showToast('苦手リストから外しました');
  } else {
    stickerWords.add(w.en);
    okWords.delete(w.en);
    showToast('🔴 苦手リストに追加しました');
  }
  document.getElementById('wordEn').style.color = stickerWords.has(w.en) ? 'var(--red)' : 'var(--text)';
  saveStorage();
}
function markOk() {
  const w = filtered[currentIndex];
  if (!w || !w.en) return;
  okWords.add(w.en); stickerWords.delete(w.en);
  saveStorage(); showToast('✅ 覚えた！');
  document.getElementById('wordEn').style.color = 'var(--text)';
  setTimeout(() => nextWord(), 500);
}

// ===================== ADD WORD =====================
function openAddWord() {
  ['newEn','newJp','newPhonetic','newExample'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addModal').classList.add('open');
}
function addWord() {
  const en = document.getElementById('newEn').value.trim();
  const jp = document.getElementById('newJp').value.trim();
  if (!en || !jp) { showToast('英単語と日本語は必須です'); return; }
  customWords.push({
    en, jp,
    ph: document.getElementById('newPhonetic').value.trim(),
    ex: document.getElementById('newExample').value.trim(),
    cat: document.getElementById('newCat').value,
    custom: true
  });
  saveStorage(); buildWords(); renderCatBar(); applyFilter();
  closeModal('addModal'); showToast('✅ 単語を追加しました！');
}

// ===================== STATS =====================
function openStats() {
  document.getElementById('statTotal').textContent = words.length;
  document.getElementById('statOk').textContent = okWords.size;
  document.getElementById('statSticker').textContent = stickerWords.size;
  document.getElementById('statCustom').textContent = customWords.length;
  const list = document.getElementById('stickerList');
  const sw = words.filter(w => stickerWords.has(w.en));
  list.innerHTML = sw.length
    ? sw.map(w => `<div class="sticker-item">
        <div><div class="sticker-word">${w.en}</div><div class="sticker-jp">${w.jp}</div></div>
        <button class="btn-remove" onclick="removeSticker('${w.en}')">✕</button>
      </div>`).join('')
    : '<div style="color:var(--subtext);font-size:13px;">まだ苦手単語はありません</div>';
  document.getElementById('statsModal').classList.add('open');
}
function removeSticker(en) {
  stickerWords.delete(en); saveStorage(); openStats(); showToast('苦手リストから外しました');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ===================== DOTS =====================
function activateDot(n) {
  stopDots();
  document.getElementById('d'+n).classList.add('active');
}
function stopDots() {
  [1,2,3].forEach(n => document.getElementById('d'+n).classList.remove('active'));
}

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===================== INIT =====================
loadStorage(); buildWords(); renderCatBar(); applyFilter(); showWord();

// ===================== SERVICE WORKER（古いキャッシュ削除のみ）=====================
if ('serviceWorker' in navigator) {
  // 古いSWを登録解除してキャッシュをクリア
  navigator.serviceWorker.register('./sw.js');
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}
</script>
