<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="英単語帳">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>英単語帳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #6366f1;
    --accent2: #818cf8;
    --text: #f1f5f9;
    --subtext: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--card);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--accent2); }
  .header-count { font-size: 12px; color: var(--subtext); }
  .header-btns { display: flex; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px;
    border: none; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: var(--text); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .icon-btn:active { background: rgba(255,255,255,0.18); }

  /* Category bar */
  .cat-bar {
    display: flex; gap: 8px; padding: 10px 16px;
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-btn {
    padding: 5px 14px; border-radius: 20px; border: none;
    background: rgba(255,255,255,0.08); color: var(--subtext);
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: all 0.2s;
  }
  .cat-btn.active { background: var(--accent); color: #fff; }

  /* Main card area */
  .card-area {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .card {
    width: 100%; max-width: 420px;
    background: var(--card);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
    cursor: pointer;
    transition: transform 0.15s;
    min-height: 260px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .card:active { transform: scale(0.98); }

  .word-category {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--accent2); text-transform: uppercase;
    margin-bottom: 16px;
  }

  .word-en {
    font-size: clamp(36px, 10vw, 56px);
    font-weight: 800; letter-spacing: -1px;
    color: var(--text); line-height: 1.1;
    margin-bottom: 8px;
  }

  .word-phonetic {
    font-size: 16px; color: var(--subtext);
    margin-bottom: 16px; min-height: 22px;
  }

  .divider {
    width: 48px; height: 2px;
    background: var(--accent); border-radius: 2px;
    margin: 0 auto 16px;
  }

  .word-jp {
    font-size: clamp(18px, 5vw, 24px);
    color: var(--subtext); font-weight: 600;
    line-height: 1.4;
  }

  .word-example {
    font-size: 13px; color: #475569;
    margin-top: 14px; line-height: 1.6;
    display: none;
  }
  .card.show-example .word-example { display: block; }

  /* Speaking indicator */
  .speaking-dots {
    display: flex; gap: 5px; margin-top: 16px;
    justify-content: center; min-height: 20px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: none; opacity: 0.2;
  }
  .dot.active { opacity: 1; animation: pulse 0.6s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.5); }
  }

  /* Swipe hint */
  .swipe-hint {
    font-size: 12px; color: #334155;
    margin-top: 16px; text-align: center;
  }

  /* Bottom controls */
  .controls {
    padding: 12px 16px 20px;
    background: var(--card);
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .btn-row {
    display: flex; gap: 10px; margin-bottom: 10px;
  }

  .btn {
    flex: 1; padding: 12px;
    border: none; border-radius: 14px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-prev { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-speak { background: var(--accent); color: #fff; flex: 1.5; }
  .btn-next { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-sticker { background: rgba(239,68,68,0.15); color: var(--red); }
  .btn-ok { background: rgba(34,197,94,0.15); color: var(--green); }

  .auto-row {
    display: flex; align-items: center; gap: 10px;
  }
  .auto-toggle {
    flex: 1; padding: 10px;
    border: none; border-radius: 12px;
    background: rgba(255,255,255,0.06); color: var(--subtext);
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .auto-toggle.on { background: rgba(99,102,241,0.2); color: var(--accent2); }

  .speed-label { font-size: 12px; color: var(--subtext); white-space: nowrap; }
  .speed-select {
    background: rgba(255,255,255,0.06); color: var(--text);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 8px 10px; font-size: 13px; cursor: pointer;
  }

  /* Progress bar */
  .progress-bar {
    height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 3px; margin-bottom: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 3px; transition: width 0.3s;
  }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%; max-width: 480px;
    background: var(--card); border-radius: 24px 24px 0 0;
    padding: 24px 20px 36px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 85dvh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--subtext); font-weight: 600; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: var(--text); font-size: 16px;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-select {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: var(--text); font-size: 15px;
  }

  .btn-submit {
    width: 100%; padding: 14px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 14px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    margin-top: 8px;
  }
  .btn-cancel {
    width: 100%; padding: 12px;
    background: rgba(255,255,255,0.06); color: var(--subtext);
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 8px;
  }

  /* Stats modal */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: rgba(255,255,255,0.05);
    border-radius: 14px; padding: 16px; text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--accent2); }
  .stat-label { font-size: 12px; color: var(--subtext); margin-top: 4px; }

  .sticker-list { display: flex; flex-direction: column; gap: 8px; }
  .sticker-item {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(239,68,68,0.08);
    border-radius: 12px; padding: 12px 14px;
  }
  .sticker-word { font-weight: 700; }
  .sticker-jp { font-size: 13px; color: var(--subtext); }
  .btn-remove {
    background: none; border: none; color: var(--red);
    font-size: 18px; cursor: pointer; padding: 4px;
  }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--accent); color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 14px; font-weight: 600;
    transition: transform 0.3s; z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Fade animation */
  .card-fade { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Auto progress ring */
  .auto-ring {
    width: 36px; height: 36px; flex-shrink: 0;
  }
  .auto-ring circle {
    fill: none; stroke-width: 3;
    transform-origin: 50% 50%;
    transform: rotate(-90deg);
    transition: stroke-dashoffset 1s linear;
  }
  .ring-bg { stroke: rgba(255,255,255,0.1); }
  .ring-fill { stroke: var(--accent); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">📖 英単語帳</div>
    <div class="header-count" id="countLabel">読み込み中...</div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" onclick="openStats()" title="統計">📊</button>
    <button class="icon-btn" onclick="openAddWord()" title="単語追加">＋</button>
  </div>
</div>

<!-- Category bar -->
<div class="cat-bar" id="catBar"></div>

<!-- Progress bar -->
<div style="padding: 0 16px;">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- Card area -->
<div class="card-area" id="cardArea">
  <div class="card" id="mainCard" onclick="handleCardTap()">
    <div class="word-category" id="wordCategory"></div>
    <div class="word-en" id="wordEn">---</div>
    <div class="word-phonetic" id="wordPhonetic"></div>
    <div class="divider"></div>
    <div class="word-jp" id="wordJp">読み込み中...</div>
    <div class="word-example" id="wordExample"></div>
    <div class="speaking-dots">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>
  <div class="swipe-hint">← スワイプまたはタップで次へ →</div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="btn-row">
    <button class="btn btn-sticker" onclick="toggleSticker()">🔴 苦手</button>
    <button class="btn btn-prev" onclick="prevWord()">◀ 前へ</button>
    <button class="btn btn-speak" onclick="speakCurrent()">🔊 読む</button>
    <button class="btn btn-next" onclick="nextWord()">次へ ▶</button>
    <button class="btn btn-ok" onclick="markOk()">✅ OK</button>
  </div>
  <div class="auto-row">
    <button class="auto-toggle" id="autoBtn" onclick="toggleAuto()">▶ 自動再生</button>
    <svg class="auto-ring" id="autoRing" viewBox="0 0 36 36" style="display:none;">
      <circle class="ring-bg" cx="18" cy="18" r="15.9"/>
      <circle class="ring-fill" id="ringFill" cx="18" cy="18" r="15.9" stroke-dasharray="100" stroke-dashoffset="100"/>
    </svg>
    <span class="speed-label">次まで</span>
    <select class="speed-select" id="speedSelect" onchange="updateSpeed()">
      <option value="3">3秒</option>
      <option value="5" selected>5秒</option>
      <option value="8">8秒</option>
      <option value="10">10秒</option>
      <option value="15">15秒</option>
      <option value="20">20秒</option>
      <option value="30">30秒</option>
    </select>
  </div>
</div>

<!-- Add Word Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">単語を追加</div>
    <div class="form-group">
      <label class="form-label">英単語 *</label>
      <input class="form-input" id="newEn" type="text" placeholder="例: accomplish" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">日本語の意味 *</label>
      <input class="form-input" id="newJp" type="text" placeholder="例: 達成する、成し遂げる" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">発音記号（任意）</label>
      <input class="form-input" id="newPhonetic" type="text" placeholder="例: /əˈkɑːmplɪʃ/" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">例文（任意）</label>
      <input class="form-input" id="newExample" type="text" placeholder="例: She accomplished her goal." autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="newCat">
        <option value="マイ単語">マイ単語</option>
        <option value="基本動詞">基本動詞</option>
        <option value="形容詞">形容詞</option>
        <option value="名詞">名詞</option>
        <option value="TOEIC">TOEIC</option>
        <option value="日常会話">日常会話</option>
        <option value="ビジネス">ビジネス</option>
      </select>
    </div>
    <button class="btn-submit" onclick="addWord()">追加する</button>
    <button class="btn-cancel" onclick="closeModal('addModal')">キャンセル</button>
  </div>
</div>

<!-- Stats Modal -->
<div class="modal-overlay" id="statsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📊 学習状況</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">総単語数</div></div>
      <div class="stat-card"><div class="stat-num" id="statOk">0</div><div class="stat-label">覚えた ✅</div></div>
      <div class="stat-card"><div class="stat-num" id="statSticker">0</div><div class="stat-label">苦手 🔴</div></div>
      <div class="stat-card"><div class="stat-num" id="statCustom">0</div><div class="stat-label">自分で追加</div></div>
    </div>
    <div class="modal-title" style="font-size:15px; margin-bottom:12px;">🔴 苦手単語リスト</div>
    <div class="sticker-list" id="stickerList"><div style="color:var(--subtext);font-size:14px;">まだ苦手単語はありません</div></div>
    <button class="btn-cancel" onclick="closeModal('statsModal')" style="margin-top:20px;">閉じる</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===================== WORD DATA =====================
const BUILTIN_WORDS = [
  // 基本動詞
  {en:"accomplish",jp:"達成する、成し遂げる",ph:"/əˈkɑːmplɪʃ/",cat:"基本動詞",ex:"She accomplished her goal."},
  {en:"achieve",jp:"達成する、獲得する",ph:"/əˈtʃiːv/",cat:"基本動詞",ex:"He achieved great success."},

  {en:"anticipate",jp:"予期する、見越す",ph:"/ænˈtɪsɪpeɪt/",cat:"基本動詞",ex:"We anticipate growth."},
  {en:"approve",jp:"承認する、賛成する",ph:"/əˈpruːv/",cat:"基本動詞",ex:"The board approved the plan."},
  {en:"assist",jp:"助ける、援助する",ph:"/əˈsɪst/",cat:"基本動詞",ex:"Can you assist me?"},

  {en:"participate",jp:"参加する",ph:"/pɑːrˈtɪsɪpeɪt/",cat:"基本動詞",ex:"Participate in the meeting."},

let words = [];
let filtered = [];
let currentIndex = 0;
let currentCat = "すべて";
let autoPlay = false;
let autoInterval = null;
let autoSeconds = 5;
let isSpeaking = false;
let okWords = new Set();
let stickerWords = new Set();
let customWords = [];
let autoCountdown = null;
let ringCircumference = 100;

function loadStorage() {
  try {
    okWords = new Set(JSON.parse(localStorage.getItem('okWords') || '[]'));
    stickerWords = new Set(JSON.parse(localStorage.getItem('stickerWords') || '[]'));
    customWords = JSON.parse(localStorage.getItem('customWords') || '[]');
  } catch(e) {}
}

function saveStorage() {
  localStorage.setItem('okWords', JSON.stringify([...okWords]));
  localStorage.setItem('stickerWords', JSON.stringify([...stickerWords]));
  localStorage.setItem('customWords', JSON.stringify(customWords));
}

function buildWords() {
  words = [...BUILTIN_WORDS, ...customWords];
}

function getCategories() {
  const cats = ["すべて", "苦手のみ"];
  const seen = new Set();
  words.forEach(w => { if (!seen.has(w.cat)) { seen.add(w.cat); cats.push(w.cat); } });
  return cats;
}

function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => selectCat(cat);
    bar.appendChild(btn);
  });
}

function selectCat(cat) {
  currentCat = cat;
  renderCatBar();
  applyFilter();
  currentIndex = 0;
  showWord();
}

function applyFilter() {
  if (currentCat === "すべて") {
    filtered = [...words];
  } else if (currentCat === "苦手のみ") {
    filtered = words.filter(w => stickerWords.has(w.en));
  } else {
    filtered = words.filter(w => w.cat === currentCat);
  }
  if (filtered.length === 0 && currentCat === "苦手のみ") {
    filtered = [{en:"苦手単語なし", jp:"苦手マークした単語がここに表示されます", ph:"", cat:"", ex:""}];
  }
  shuffle(filtered);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showWord() {
  if (filtered.length === 0) return;
  const w = filtered[currentIndex];
  const card = document.getElementById('mainCard');
  card.className = 'card card-fade';
  setTimeout(() => card.classList.remove('card-fade'), 400);

  document.getElementById('wordEn').textContent = w.en;
  document.getElementById('wordPhonetic').textContent = w.ph || '';
  document.getElementById('wordJp').textContent = w.jp;
  document.getElementById('wordCategory').textContent = w.cat || '';
  document.getElementById('wordExample').textContent = w.ex ? '📝 ' + w.ex : '';
  card.classList.remove('show-example');

  // Sticker indicator
  const enEl = document.getElementById('wordEn');
  enEl.style.color = stickerWords.has(w.en) ? 'var(--red)' : 'var(--text)';

  updateProgress();
  updateCount();
  stopDots();

  // Auto speak
  setTimeout(() => speakWord(w), 300);
}

function updateCount() {
  const total = filtered.length;
  const cur = total > 0 ? currentIndex + 1 : 0;
  document.getElementById('countLabel').textContent = `${cur} / ${total}語`;
}

function updateProgress() {
  const pct = filtered.length > 0 ? ((currentIndex + 1) / filtered.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===================== TTS =====================
let voices = [];
let femaleEnVoice = null;
let femaleJaVoice = null;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  // Find female English voice
  const enPriority = ["Samantha","Karen","Moira","Tessa","Allison","Ava","Susan","Victoria","Fiona"];
  for (const name of enPriority) {
    const v = voices.find(v => v.name.includes(name));
    if (v) { femaleEnVoice = v; break; }
  }
  if (!femaleEnVoice) {
    femaleEnVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'))
      || voices.find(v => v.lang === 'en-US')
      || voices.find(v => v.lang.startsWith('en'));
  }
  // Find Japanese voice
  femaleJaVoice = voices.find(v => v.lang === 'ja-JP' && (v.name.includes('Kyoko') || v.name.includes('O-Ren')))
    || voices.find(v => v.lang === 'ja-JP')
    || voices.find(v => v.lang.startsWith('ja'));
}

if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function speak(text, voice, rate, onEnd) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    if (voice) u.voice = voice;
    u.rate = rate || 0.9;
    u.pitch = 1.1;
    u.onend = () => { if (onEnd) onEnd(); resolve(); };
    u.onerror = () => resolve();
    speechSynthesis.speak(u);
  });
}

async function speakWord(w) {
  if (!w || !w.en || w.en === '苦手単語なし') return;
  if (isSpeaking) { speechSynthesis.cancel(); isSpeaking = false; }
  isSpeaking = true;
  activateDot(1);
  await speak(w.en, femaleEnVoice, 0.85);
  activateDot(2);
  await speak(w.en, femaleEnVoice, 0.85);
  activateDot(3);
  await speak(w.en, femaleEnVoice, 0.85);
  stopDots();
  await delay(300);
  if (femaleJaVoice) {
    await speak(w.jp, femaleJaVoice, 0.9);
  }
  isSpeaking = false;
}

function speakCurrent() {
  speechSynthesis.cancel();
  isSpeaking = false;
  stopDots();
  const w = filtered[currentIndex];
  if (w) speakWord(w);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function activateDot(n) {
  stopDots();
  document.getElementById('d'+n).classList.add('active');
}
function stopDots() {
  ['d1','d2','d3'].forEach(id => document.getElementById(id).classList.remove('active'));
}

// ===================== NAVIGATION =====================
function nextWord() {
  speechSynthesis.cancel();
  isSpeaking = false;
  currentIndex = (currentIndex + 1) % filtered.length;
  showWord();
  if (autoPlay) resetAutoTimer();
}

function prevWord() {
  speechSynthesis.cancel();
  isSpeaking = false;
  currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
  showWord();
  if (autoPlay) resetAutoTimer();
}

function handleCardTap() {
  const card = document.getElementById('mainCard');
  const w = filtered[currentIndex];
  if (w && w.ex) {
    card.classList.toggle('show-example');
  } else {
    nextWord();
  }
}

// ===================== SWIPE =====================
let touchStartX = 0;
let touchStartY = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextWord(); else prevWord();
  }
}, {passive: true});

// ===================== AUTO PLAY =====================
function toggleAuto() {
  autoPlay = !autoPlay;
  const btn = document.getElementById('autoBtn');
  const ring = document.getElementById('autoRing');
  if (autoPlay) {
    btn.textContent = '⏸ 停止';
    btn.classList.add('on');
    ring.style.display = 'block';
    startAutoTimer();
  } else {
    btn.textContent = '▶ 自動再生';
    btn.classList.remove('on');
    ring.style.display = 'none';
    clearAutoTimers();
  }
}

function updateSpeed() {
  autoSeconds = parseInt(document.getElementById('speedSelect').value);
  if (autoPlay) { clearAutoTimers(); startAutoTimer(); }
}

function startAutoTimer() {
  let elapsed = 0;
  const fill = document.getElementById('ringFill');
  const circ = 100;
  fill.style.strokeDashoffset = circ;

  autoCountdown = setInterval(() => {
    elapsed++;
    const offset = circ - (elapsed / autoSeconds) * circ;
    fill.style.strokeDashoffset = Math.max(0, offset);
    if (elapsed >= autoSeconds) {
      nextWord();
    }
  }, 1000);
}

function resetAutoTimer() {
  clearAutoTimers();
  startAutoTimer();
}

function clearAutoTimers() {
  if (autoCountdown) { clearInterval(autoCountdown); autoCountdown = null; }
  const fill = document.getElementById('ringFill');
  if (fill) fill.style.strokeDashoffset = 100;
}

// ===================== STICKER & OK =====================
function toggleSticker() {
  const w = filtered[currentIndex];
  if (!w || !w.en) return;
  if (stickerWords.has(w.en)) {
    stickerWords.delete(w.en);
    showToast('苦手リストから外しました');
  } else {
    stickerWords.add(w.en);
    okWords.delete(w.en);
    showToast('🔴 苦手リストに追加しました');
  }
  document.getElementById('wordEn').style.color = stickerWords.has(w.en) ? 'var(--red)' : 'var(--text)';
  saveStorage();
}

function markOk() {
  const w = filtered[currentIndex];
  if (!w || !w.en) return;
  okWords.add(w.en);
  stickerWords.delete(w.en);
  saveStorage();
  showToast('✅ 覚えた！');
  document.getElementById('wordEn').style.color = 'var(--text)';
  setTimeout(() => nextWord(), 600);
}

// ===================== ADD WORD =====================
function openAddWord() {
  document.getElementById('newEn').value = '';
  document.getElementById('newJp').value = '';
  document.getElementById('newPhonetic').value = '';
  document.getElementById('newExample').value = '';
  document.getElementById('addModal').classList.add('open');
}

function addWord() {
  const en = document.getElementById('newEn').value.trim();
  const jp = document.getElementById('newJp').value.trim();
  const ph = document.getElementById('newPhonetic').value.trim();
  const ex = document.getElementById('newExample').value.trim();
  const cat = document.getElementById('newCat').value;
  if (!en || !jp) { showToast('英単語と日本語は必須です'); return; }
  customWords.push({en, jp, ph, cat, ex, custom: true});
  saveStorage();
  buildWords();
  renderCatBar();
  applyFilter();
  closeModal('addModal');
  showToast('✅ 単語を追加しました！');
}

// ===================== STATS =====================
function openStats() {
  document.getElementById('statTotal').textContent = words.length;
  document.getElementById('statOk').textContent = okWords.size;
  document.getElementById('statSticker').textContent = stickerWords.size;
  document.getElementById('statCustom').textContent = customWords.length;

  const list = document.getElementById('stickerList');
  const sWords = words.filter(w => stickerWords.has(w.en));
  if (sWords.length === 0) {
    list.innerHTML = '<div style="color:var(--subtext);font-size:14px;">まだ苦手単語はありません</div>';
  } else {
    list.innerHTML = sWords.map(w => `
      <div class="sticker-item">
        <div><div class="sticker-word">${w.en}</div><div class="sticker-jp">${w.jp}</div></div>
        <button class="btn-remove" onclick="removeSticker('${w.en}')">✕</button>
      </div>
    `).join('');
  }
  document.getElementById('statsModal').classList.add('open');
}

function removeSticker(en) {
  stickerWords.delete(en);
  saveStorage();
  openStats();
  showToast('苦手リストから外しました');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===================== INIT =====================
function init() {
  loadStorage();
  buildWords();
  renderCatBar();
  applyFilter();
  currentIndex = 0;
  showWord();
}

init();
</script>
</body>
</html>
